<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Academic prototype for explainable dementia status classification.">
  <title>Dementia Status Classification Prototype</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;700;800&family=DM+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #020617; font-family: "DM Sans", sans-serif; -webkit-font-smoothing: antialiased; }
    input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; width: 100%; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #fff; cursor: pointer; margin-top: -6px; box-shadow: 0 0 0 4px rgba(56,189,248,.2); }
    input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #1e293b; border-radius: 2px; }
    input[type=range]:focus { outline: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    @media (max-width: 900px) {
      .app-grid { grid-template-columns: 1fr !important; }
      .model-grid { flex-direction: column; }
    }
    @media (max-width: 620px) {
      .page-header { padding: 16px !important; flex-wrap: wrap; }
      .page-content { padding: 20px 14px !important; }
      .input-grid { grid-template-columns: 1fr !important; }
      .header-notice { margin-left: 56px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="rf-data.js"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
